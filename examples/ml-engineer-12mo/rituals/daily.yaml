- id: ml-daily-morning-reading
  title: "Morning reading: {current_book}"
  description: |
    30 min. Paper book, paper notebook.
    Today's book: {current_book}.
  due: "today at {ritual_times.morning_reading}"
  labels: [daily-ritual]
  cadence: daily
  skip_if: sunday

- id: ml-daily-srs-review
  title: "Spaced-repetition review (Anki)"
  description: |
    10–15 min. Whenever — commute, lunch, before bed.
    Add 3–5 new cards per day from what you read and built. No more.
    Without SRS, you'll forget 80% of this curriculum inside a month.
    This is the highest-leverage 15 minutes of the day.
  due: "today at {ritual_times.srs_review}"
  labels: [daily-ritual]
  cadence: daily
  skip_if: sunday

- id: ml-daily-evening-build
  title: "Evening build (60–90 min)"
  description: |
    Work the current module. Code on the keyboard, not in your head.
  due: "today at {ritual_times.evening_hands_on}"
  labels: [daily-ritual]
  cadence: daily
  skip_if: sunday

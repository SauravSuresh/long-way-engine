# Declares which ritual_time slots and template placeholders this
# curriculum requires from the engine. Engine validates at startup
# that config.yaml provides every ritual_times_required key.

ritual_times_required:
  - morning_reading
  - anki
  - evening_hands_on
  - friday_review
  - saturday_deep_block
  - sunday_trace
  - weekly_state_review

placeholders_used:
  - current_book
  - current_module
  - next_module
  - next_book
  - current_phase_name
  - iso_year
  - iso_week
  - year
  - month
  - quarter

config_flags:
  pair_day: thursday
  sunday_off: true

# The weekly state-review template; the engine reads its sub-tasks
# checkboxes during the next cron and mutates state.yaml accordingly.
state_review_template_id: weekly-state-review

- id: daily-morning-reading
  title: "Morning reading: {current_book}"
  description: |
    30 min. Paper book, paper notebook, no laptop.
    Same chair, same time. This is sacred.
    Today's book: {current_book}.
  due: "today at {ritual_times.morning_reading}"
  labels: [daily-ritual]
  cadence: daily
  skip_if: sunday

- id: daily-anki
  title: "Anki review"
  description: |
    10–15 min. Whenever — commute, lunch, before bed.
    Add 3–5 new cards per day from what you read and built. No more.
  due: "today at {ritual_times.anki}"
  labels: [daily-ritual]
  cadence: daily
  skip_if: sunday

- id: daily-evening-hands-on
  title: "Evening hands-on (60–90 min)"
  description: |
    boot.dev, the side build, or the main project. In nvim.
    Without AI writing code for you (using AI to *explain* concepts is fine).

    Skipped on Sunday (rest day) and on pair days (the weekly
    pair-with-engineer session replaces solo evening work that day).
  due: "today at {ritual_times.evening_hands_on}"
  labels: [daily-ritual]
  cadence: daily
  skip_if:
    - sunday
    - pair_day

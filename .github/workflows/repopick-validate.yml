name: repopick-validate

on:
  pull_request:
    paths:
      - "docs/repopick/data/**"
      - "docs/repopick/scripts/validate.mjs"
      - ".github/workflows/repopick-validate.yml"
  push:
    branches: [main]
    paths:
      - "docs/repopick/data/**"
      - "docs/repopick/scripts/validate.mjs"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Schema + duplicates (must pass)
        run: node docs/repopick/scripts/validate.mjs

      - name: Network checks — URLs, refs (best-effort)
        run: node docs/repopick/scripts/validate.mjs --strict
        continue-on-error: true

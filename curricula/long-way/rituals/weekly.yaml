- id: weekly-state-review
  title: "Weekly state review — {iso_year}-W{iso_week:02d}"
  description: |
    Check the sub-tasks that apply to your week. Next cron run picks
    them up and mutates state.yaml: module advance, book transitions,
    pause, counter increments, revert. Skip the boxes that don't apply.
  due: "today at {ritual_times.weekly_state_review}"
  labels: [weekly-ritual, state-review]
  cadence: weekly
  day_of_week: sunday
  state_review: true
  sub_tasks:
    - title: "I'm ready to advance to Module {next_module}"
      action: { type: advance_module }
      show_if: not_on_last_module

    - title: "I finished {current_book}"
      action: { type: mark_book_finished, book: "{current_book}" }

    - title: "I started a new primary book this week"
      action: { type: mark_book_started, book: "{next_book}" }
      show_if: book_transition_this_month

    - title: "Anki cards added this week (put the count in a comment)"
      action: { type: increment_counter, counter: anki_card_count }

    - title: "Revert last week's state change (only if a mistake)"
      action: { type: revert_last }

- id: weekly-friday-review
  title: "Friday review: 20-min retrieval"
  description: |
    Without looking at your notes, write down the 3 most important
    things you learned this week. Then compare to your notes. The gap
    is the diagnostic — that's what your Anki cards for next week
    should target.
  due: "today at {ritual_times.friday_review}"
  labels: [weekly-ritual, reflection]
  cadence: weekly
  day_of_week: friday
  reflection:
    create_stub: true
    stub_path: "reflections/weekly/{iso_year}-W{iso_week:02d}.md"

- id: weekly-saturday-deep-block
  title: "Saturday deep block (3–4 hr)"
  description: |
    Bigger project work, or a chapter that needs uninterrupted thought.
  due: "today at {ritual_times.saturday_deep_block}"
  labels: [weekly-ritual]
  cadence: weekly
  day_of_week: saturday
  # On last-Saturdays the monthly retrieval + monthly review take over the
  # Saturday deep-block slot. Skip the deep block to avoid a quadruple-fire
  # (Phase F item 5; reuses the existing skip_if list machinery).
  skip_if:
    - last-saturday-of-month
